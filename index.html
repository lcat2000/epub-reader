<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com;
               script-src 'self' https://cdnjs.cloudflare.com;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src https://fonts.gstatic.com;
               img-src 'self' data: blob: https://clustrmaps.com https://*.clustrmaps.com;
               connect-src 'none';
               object-src 'none';
               base-uri 'self';
               form-action 'none'">
<!-- Note: frame-ancestors requires HTTP header (not meta tag) to take effect.
     GitHub Pages does not support custom headers, so clickjacking protection
     via frame-ancestors cannot be enforced on this hosting platform. -->
<title>ePUB 閱讀器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="reader.css">
</head>
<body class="theme-day" data-layout="horizontal">

<!-- ══ Drop Zone ══════════════════════════════════════════════════════════ -->
<div id="drop-zone" role="button" tabindex="0" aria-label="拖放 ePUB 檔案至此開啟">
  <div id="drop-inner">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" aria-hidden="true">
      <rect x="8" y="12" width="40" height="52" rx="4" fill="#c8e6c9" stroke="#4a7c40" stroke-width="2"/>
      <rect x="14" y="20" width="28" height="3" rx="1.5" fill="#4a7c40" opacity=".5"/>
      <rect x="14" y="28" width="28" height="3" rx="1.5" fill="#4a7c40" opacity=".5"/>
      <rect x="14" y="36" width="20" height="3" rx="1.5" fill="#4a7c40" opacity=".5"/>
      <circle cx="52" cy="52" r="16" fill="#2d5a27"/>
      <path d="M52 44v16M44 52l8 8 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p class="drop-title">ePUB 閱讀器</p>
    <p class="drop-sub">拖放 .epub 檔案至此，或</p>
    <div class="open-btns">
      <button id="btn-open" type="button">選擇檔案</button>
      <button id="btn-gdrive" type="button">
        <svg width="16" height="16" viewBox="0 0 87.3 78" aria-hidden="true">
          <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
          <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0-1.2 4.5h27.5z" fill="#00ac47"/>
          <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.5l5.85 11.5z" fill="#ea4335"/>
          <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
          <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
          <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
        </svg>
        Google Drive
      </button>
      <button id="btn-haodoo" type="button">好讀下載</button>
    </div>
    <p class="drop-hint">支援 ePUB 2 / ePUB 3 · 中文直排/橫排</p>
    <input type="file" id="file-input" accept=".epub" hidden>
    <a href="https://clustrmaps.com/site/1c9mf" title="ClustrMaps"><img src="//www.clustrmaps.com/map_v2.png?d=gvdG3wqO_34HaoI9NHTrI3ttd6h1svlPiiN28h_Z8O8&cl=ffffff"></a>
  </div>
</div>

<!-- ══ Top Toolbar ════════════════════════════════════════════════════════ -->
<header id="top-bar" hidden>
  <button id="btn-toc-toggle" class="icon-btn" aria-label="目錄" aria-expanded="false" title="目錄 (T)">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
      <rect x="2" y="3" width="14" height="2" rx="1"/>
      <rect x="2" y="8" width="14" height="2" rx="1"/>
      <rect x="2" y="13" width="10" height="2" rx="1"/>
    </svg>
  </button>

  <span id="book-title-display" title=""></span>

  <nav id="chapter-nav" aria-label="章節導覽">
    <button id="btn-prev" class="nav-btn" aria-label="上一章" title="上一章 (←)" disabled>&#8249;</button>
    <span id="progress-label" aria-live="polite">— / —</span>
    <button id="btn-next" class="nav-btn" aria-label="下一章" title="下一章 (→)" disabled>&#8250;</button>
  </nav>

  <div id="toolbar-controls">
    <div class="ctrl-group" title="字型大小">
      <button id="btn-font-dec" class="ctrl-btn" aria-label="縮小字型">A-</button>
      <span id="font-size-display">18</span>
      <button id="btn-font-inc" class="ctrl-btn" aria-label="放大字型">A+</button>
    </div>

    <div class="ctrl-group" title="版面方向">
      <button id="btn-layout-toggle" class="ctrl-btn" aria-label="切換直排/橫排" title="直排/橫排 (V)">橫→直</button>
    </div>

    <div class="ctrl-group theme-group" title="主題">
      <button data-theme="day"   class="theme-btn active" aria-label="白天模式"  title="白天">日</button>
      <button data-theme="sepia" class="theme-btn"        aria-label="棕色模式"  title="棕色">棕</button>
      <button data-theme="night" class="theme-btn"        aria-label="夜晚模式"  title="夜晚">夜</button>
    </div>

    <button id="btn-open-new" class="ctrl-btn open-btn" aria-label="開啟新書" title="開啟新書 (O)">
      開啟
    </button>
    <input type="file" id="file-input-new" accept=".epub" hidden>
    <button id="btn-gdrive-new" class="ctrl-btn open-btn" aria-label="從 Google Drive 開啟" title="從 Google Drive 開啟">Drive</button>
  </div>
</header>

<!-- ══ TOC Sidebar ════════════════════════════════════════════════════════ -->
<aside id="toc-sidebar" hidden aria-label="目錄">
  <div id="toc-header">
    <span>目錄</span>
    <button id="btn-toc-close" class="icon-btn" aria-label="關閉目錄">✕</button>
  </div>
  <nav id="toc-list" aria-label="書目章節"></nav>
</aside>

<div id="toc-backdrop" hidden aria-hidden="true"></div>

<!-- ══ Loading Overlay ════════════════════════════════════════════════════ -->
<div id="loading-overlay" hidden>
  <div id="loading-inner">
    <div class="spinner" aria-hidden="true"></div>
    <p id="loading-msg">載入中…</p>
  </div>
</div>

<!-- ══ Error Toast ════════════════════════════════════════════════════════ -->
<div id="error-toast" hidden role="alert" aria-live="assertive"></div>


<!-- ══ Chapter Jump Menu ══════════════════════════════════════════════════ -->
<div id="jump-menu" hidden role="menu" aria-label="章節跳轉">
  <button id="jump-prev" role="menuitem">&#8249; 上一章</button>
  <button id="jump-next" role="menuitem">下一章 &#8250;</button>
</div>

<!-- ══ Reader Area ════════════════════════════════════════════════════════ -->
<main id="reader-area" hidden aria-label="書籍內容">
  <div id="chapter-display" tabindex="0" aria-live="polite" aria-label="章節內容"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
        integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"
        integrity="sha512-78KH17QLT5e55GJqP76vutp1D2iAoy06WcYBXB6iBCsmO6wWzx0Qdg8EDpm8mKXv68BcvHOyeeP4wxAL0twJGQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="reader.js"></script>
</body>
</html>
